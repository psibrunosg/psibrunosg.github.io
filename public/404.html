  <title>Bruno SG · Psicólogo</title>
  <script>
    // SPA redirect for GitHub Pages
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/' +
      '?p=' + encodeURIComponent(l.pathname + l.search) +
      (l.hash || '')
    );
  </script>
</head>
